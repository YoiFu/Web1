<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Changa One font from google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwindcss + Flowbite -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      id="theme"
      href="https://flowbite.com/docs/main.css?v=4.0.1"
    />

    <style type="text/tailwindcss">
      @theme {
        --font-heading: "Changa One", cursive;
        --font-body: "Trebuchet MS", Arial, Helvetica, sans-serif;
        --color-primary: var(--color-cyan-600);
      }

      @layer base {
        body {
          @apply font-body;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        nav a {
          @apply font-heading;
        }
      }

      @layer components {
        .active {
          @apply !text-cyan-600;
        }

        footer .active {
          @apply !text-pink-300;
        }

        .read-more {
          @apply !text-cyan-600 underline text-sm;
        }
      }

      @utility highlight {
        color: var(--color-primary);
      }

      .hero-bg {
        background-image:
          url("images/logo_bg.png"), url("images/search_bg.png");

        background-repeat: no-repeat;

        background-position:
          left top,
          right top;
      }
    </style>

    <title>Web1 - Project HomePage</title>
  </head>
  <body>
    <!-- Header Navbar -->
    <header>
      <nav class="bg-neutral-primary w-full z-20 top-0 start-0">
        <div
          class="max-w-7xl flex flex-wrap items-center justify-between mx-auto p-4"
        >
          <a
            href="index.html"
            class="flex items-center space-x-3 rtl:space-x-reverse"
          >
            <img src="images/logo.png" class="h-18" alt="Flowbite Logo" />
          </a>
          <div class="flex items-center md:order-2">
            <button
              type="button"
              data-collapse-toggle="navbar-search"
              aria-controls="navbar-search"
              aria-expanded="false"
              class="flex items-center justify-center md:hidden text-body hover:text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-2 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm w-10 h-10 focus:outline-none"
            >
              <svg
                class="w-6 h-6 text-green-500"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                />
              </svg>
              <span class="sr-only">Search</span>
            </button>
            <label for="input-group-1" class="sr-only">Your Email</label>
            <div class="relative hidden md:block">
              <div
                class="absolute inset-y-0 end-2 flex items-center ps-3 pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-green-500"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                    d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="input-group-1"
                class="block w-full ps-2 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-full focus:ring-brand focus:border-brand px-2.5 py-2 shadow-xs placeholder:text-body"
                placeholder="Search"
              />
            </div>
            <button
              data-collapse-toggle="navbar-search"
              type="button"
              class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
              aria-controls="navbar-search"
              aria-expanded="false"
            >
              <span class="sr-only">Open main menu</span>
              <svg
                class="w-6 h-6"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="M5 7h14M5 12h14M5 17h14"
                />
              </svg>
            </button>
          </div>
          <div
            class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
            id="navbar-search"
          >
            <div class="relative mt-3 md:hidden">
              <div
                class="absolute inset-y-0 end-0 flex items-center ps-3 pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-green-500"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                    d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="input-group-1"
                class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-full focus:ring-brand focus:border-brand px-2.5 py-2 shadow-xs placeholder:text-body"
                placeholder="Search"
              />
            </div>
            <ul
              class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary"
            >
              <li>
                <a
                  href="index.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  aria-current="page"
                  >Home</a
                >
              </li>
              <li>
                <a
                  href="about.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent active"
                  >About</a
                >
              </li>
              <li>
                <a
                  href="gallery.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Gallery</a
                >
              </li>
              <li>
                <a
                  href="blog.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Blogs</a
                >
              </li>
              <li>
                <a
                  href="contact.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Contact</a
                >
              </li>
              <li>
                <a
                  href="register.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Register</a
                >
              </li>
              <li>
                <a
                  href="login.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Login</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Banner when screen size is small -->
    <section class="bg-[url('images/bg-banner.gif')] bg-repeat h-2"></section>

    <!-- About us -->
    <section class="w-full px-8">
      <div
        class="max-w-7xl mx-auto flex flex-col md:grid md:grid-cols-[6.5fr_3.5fr] py-8 gap-8"
      >
        <div>
          <h1 class="font-heading text-7xl">About Us</h1>
          <div class="py-8" id="aboutus"></div>
        </div>
        <div>
          <h1 class="font-heading text-7xl">Our Vision</h1>
          <div class="py-8 flex flex-col gap-4" id="visions"></div>
        </div>
      </div>
    </section>

    <!-- Testimonials -->
    <section class="w-full bg-pink-300 text-neutral-800 py-8 px-8">
      <div class="max-w-7xl mx-auto">
        <h1 class="text-7xl text-white font-heading mb-8">Testimonials</h1>
        <div
          class="flex flex_col md:grid md:grid-cols-[1fr_1fr_1fr] gap-8 w-full"
          id="testinomials"
        >
        </div>
      </div>
    </section>

    <!-- Our team -->
    <section class="max-w-7xl py-8 px-8 mx-auto">
      <h1 class="text-7xl font-heading mb-8">Our Team</h1>
      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"
        id="our-teams"
      ></div>
    </section>

    <footer
      class="w-full bg-[url('images/bg-footer.gif')] bg-repeat bg-gray-600 text-center text-white py-4"
    >
      <nav class="max-w-7xl mx-auto flex items-center justify-center">
        <ul
          class="font-medium flex flex-col p-4 md:p-0 mt-4 md:flex-row md:space-x-8 rtl:space-x-revers"
        >
          <li>
            <a
              href="index.html"
              class="text-white text-heading hover:text-pink-300!"
              aria-current="page"
              >Home</a
            >
          </li>
          <li>
            <a href="about.html" class="text-heading active">About</a>
          </li>
          <li>
            <a
              href="gallery.html"
              class="text-white text-heading hover:text-pink-300!"
              >Gallery</a
            >
          </li>
          <li>
            <a
              href="blog.html"
              class="text-white text-heading hover:text-pink-300!"
              >Blogs</a
            >
          </li>
          <li>
            <a
              href="contact.html"
              class="text-white text-heading hover:text-pink-300!"
              >Contact</a
            >
          </li>
          <li>
            <a
              href="register.html"
              class="text-white text-heading hover:text-pink-300!"
              >Register</a
            >
          </li>
          <li>
            <a
              href="login.html"
              class="text-white text-heading hover:text-pink-300!"
              >Login</a
            >
          </li>
        </ul>
      </nav>
      <div class="text-center mt-4 mb-3">
        Copyright © 2026 by 25880080 - Nguyen Hoang Vu
      </div>
    </footer>

    <script src="https://flowbite.com/docs/flowbite.min.js"></script>

    <!-- HandleBar -->
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>

    <!-- AboutUs Template -->
    <script type="text/x-handlebars-template" id="aboutus-template">
      {{#each data}}
        <a href="details.html">
          <img
            src={{thumbpath}}
            alt="About Us"
            class="rounded-xl mb-8 me-8 block lg:float-start"
          />
        </a>
        <div class="text-justify">
          {{{summary}}}
        </div>
        <a href="details.html?id={{id}}" class="read-more">Read more</a>
      {{/each}}
    </script>

    <!-- Visions Template -->
    <script type="text/x-handlebars-template" id="visions-template">
      {{#each data}}
        <div class="flex gap-4">
          <div class="w-40 h-40 rounded-2xl overflow-hidden shrink-0">
            <a href="details.html">
              <img
                src={{thumbpath}}
                alt={{title}}
                class="w-full h-full object-cover"
              />
            </a>
          </div>
          <div>
            <h2 class="font-heading text-3xl">{{title}}</h2>
            {{summary}}
          </div>
        </div>
      {{/each}}
    </script>

    <!-- Teams Template -->
    <script type="text/x-handlebars-template" id="our-teams-template">
      {{#each data}}
        <div class="flex flex-col gap-4">
          <div class="w-full aspect-8/5 rounded-2xl overflow-hidden shrink-0">
            <a href="details.html?id={{id}}">
              <img
                src={{thumbpath}}
                alt={{title}}
                class="w-full h-full object-contain"
              />
            </a>
          </div>
          <div>
            <h2 class="text-3xl font-heading mb-4 hover:text-cyan-600">
              {{title}}
            </h2>
            <p>{{summary}}</p>
          </div>
        </div>
      {{/each}}
    </script>

    <!-- Testinomials Template -->
    <script type="text/x-handlebars-template" id="testinomials-template">
      {{#each data}}
        <div class="bg-[url('images/quot.png')] bg-top-left bg-no-repeat ps-11">
          <p class="text-justify">
            {{message}}
          </p>
          <p class="text-white mt-4">{{name}}</p>
          <a
            href="mailto:patrick@demolink.org"
            class="read-more"
          >{{email}}</a>
        </div>
      {{/each}}
    </script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/mssv.js"></script>
    <script src="js/api/database.js"></script>
    <script>
      (async function () {
        const allData = await fetchDataByTypes(["aboutus", "visions", "team"]);
        const aboutUs = allData.filter((item) => item.type === "aboutus");
        const visions = allData.filter((item) => item.type === "visions");
        const teams = allData.filter((item) => item.type === "team");

        renderView("aboutus-template", "aboutus", aboutUs);
        renderView("visions-template", "visions", visions);
        renderView("our-teams-template", "our-teams", teams);

        const testinomials = await fetchTestimonials();
        renderView("testinomials-template", "testinomials", testinomials);
      })();
    </script>
  </body>
</html>
