<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Changa One font from google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwindcss + Flowbite -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      id="theme"
      href="https://flowbite.com/docs/main.css?v=4.0.1"
    />

    <style type="text/tailwindcss">
      @theme {
        --font-heading: "Changa One", cursive;
        --font-body: "Trebuchet MS", Arial, Helvetica, sans-serif;
        --color-primary: var(--color-cyan-600);
      }

      @layer base {
        body {
          @apply font-body;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        nav a {
          @apply font-heading;
        }
      }

      @layer components {
        .active {
          @apply !text-cyan-600;
        }

        footer .active {
          @apply !text-pink-300;
        }

        .read-more {
          @apply !text-cyan-600 underline text-sm;
        }
      }

      @utility highlight {
        color: var(--color-primary);
      }

      .hero-bg {
        background-image:
          url("images/logo_bg.png"), url("images/search_bg.png");

        background-repeat: no-repeat;

        background-position:
          left top,
          right top;
      }
    </style>

    <title>Web1 - Project HomePage</title>
  </head>
  <body>
    <!-- Header Navbar -->
    <header>
      <nav class="bg-neutral-primary w-full z-20 top-0 start-0">
        <div
          class="max-w-7xl flex flex-wrap items-center justify-between mx-auto p-4"
        >
          <a
            href="index.html"
            class="flex items-center space-x-3 rtl:space-x-reverse"
          >
            <img src="images/logo.png" class="h-18" alt="Flowbite Logo" />
          </a>
          <div class="flex items-center md:order-2">
            <button
              type="button"
              data-collapse-toggle="navbar-search"
              aria-controls="navbar-search"
              aria-expanded="false"
              class="flex items-center justify-center md:hidden text-body hover:text-heading bg-transparent box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-2 focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm w-10 h-10 focus:outline-none"
            >
              <svg
                class="w-6 h-6 text-green-500"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                />
              </svg>
              <span class="sr-only">Search</span>
            </button>
            <label for="input-group-1" class="sr-only">Your Email</label>
            <div class="relative hidden md:block">
              <div
                class="absolute inset-y-0 end-2 flex items-center ps-3 pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-green-500"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                    d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="input-group-1"
                class="block w-full ps-2 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-full focus:ring-brand focus:border-brand px-2.5 py-2 shadow-xs placeholder:text-body"
                placeholder="Search"
              />
            </div>
            <button
              data-collapse-toggle="navbar-search"
              type="button"
              class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-body rounded-base md:hidden hover:bg-neutral-secondary-soft hover:text-heading focus:outline-none focus:ring-2 focus:ring-neutral-tertiary"
              aria-controls="navbar-search"
              aria-expanded="false"
            >
              <span class="sr-only">Open main menu</span>
              <svg
                class="w-6 h-6"
                aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                fill="none"
                viewBox="0 0 24 24"
              >
                <path
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-width="2"
                  d="M5 7h14M5 12h14M5 17h14"
                />
              </svg>
            </button>
          </div>
          <div
            class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1"
            id="navbar-search"
          >
            <div class="relative mt-3 md:hidden">
              <div
                class="absolute inset-y-0 end-0 flex items-center ps-3 pointer-events-none"
              >
                <svg
                  class="w-4 h-4 text-green-500"
                  aria-hidden="true"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="none"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke="currentColor"
                    stroke-linecap="round"
                    stroke-width="2"
                    d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
                  />
                </svg>
              </div>
              <input
                type="text"
                id="input-group-1"
                class="block w-full ps-9 pe-3 py-2.5 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-full focus:ring-brand focus:border-brand px-2.5 py-2 shadow-xs placeholder:text-body"
                placeholder="Search"
              />
            </div>
            <ul
              class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-default rounded-base bg-neutral-secondary-soft md:flex-row md:space-x-8 rtl:space-x-reverse md:mt-0 md:border-0 md:bg-neutral-primary"
            >
              <li>
                <a
                  href="index.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  aria-current="page"
                  >Home</a
                >
              </li>
              <li>
                <a
                  href="about.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >About</a
                >
              </li>
              <li>
                <a
                  href="gallery.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Gallery</a
                >
              </li>
              <li>
                <a
                  href="blog.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent active"
                  >Blogs</a
                >
              </li>
              <li>
                <a
                  href="contact.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Contact</a
                >
              </li>
              <li>
                <a
                  href="register.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Register</a
                >
              </li>
              <li>
                <a
                  href="login.html"
                  class="block py-2 px-3 text-heading rounded hover:bg-neutral-tertiary md:hover:bg-transparent md:border-0 md:hover:text-cyan-600! md:p-0 md:dark:hover:bg-transparent"
                  >Login</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Banner when screen size is small -->
    <section class="bg-[url('images/bg-banner.gif')] bg-repeat h-2"></section>

    <section class="w-full px-8">
      <div
        class="max-w-7xl mx-auto flex flex-col md:grid md:grid-cols-[6.5fr_3.5fr] py-8 gap-8"
      >
        <div>
          <h1 class="font-heading text-7xl">Blogs</h1>
          <div class="py-8" id="blogs"></div>
        </div>
        <div>
          <h1 class="font-heading text-7xl mb-8">Categories</h1>
          <ul
            class="max-w-md space-y-2 text-body list-inside"
            id="blogs-categories"
          ></ul>
        </div>
      </div>
    </section>

    <footer
      class="w-full bg-[url('images/bg-footer.gif')] bg-repeat bg-gray-600 text-center text-white py-4"
    >
      <nav class="max-w-7xl mx-auto flex items-center justify-center">
        <ul
          class="font-medium flex flex-col p-4 md:p-0 mt-4 md:flex-row md:space-x-8 rtl:space-x-revers"
        >
          <li>
            <a
              href="index.html"
              class="text-white text-heading hover:text-pink-300!"
              aria-current="page"
              >Home</a
            >
          </li>
          <li>
            <a
              href="about.html"
              class="text-white text-heading hover:text-pink-300!"
              >About</a
            >
          </li>
          <li>
            <a
              href="gallery.html"
              class="text-white text-heading hover:text-pink-300!"
              >Gallery</a
            >
          </li>
          <li>
            <a href="blog.html" class="active text-heading">Blogs</a>
          </li>
          <li>
            <a
              href="contact.html"
              class="text-white text-heading hover:text-pink-300!"
              >Contact</a
            >
          </li>
          <li>
            <a
              href="register.html"
              class="text-white text-heading hover:text-pink-300!"
              >Register</a
            >
          </li>
          <li>
            <a
              href="login.html"
              class="text-white text-heading hover:text-pink-300!"
              >Login</a
            >
          </li>
        </ul>
      </nav>
      <div class="text-center mt-4 mb-3">
        Copyright © 2026 by 25880080 - Nguyen Hoang Vu
      </div>
    </footer>

    <script src="https://flowbite.com/docs/flowbite.min.js"></script>
    <!-- HandleBar -->
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script src="js/handlebars-pagination-helper.js"></script>

    <!-- Categories Template-->
    <script type="text/x-handlebars-template" id="blogs-categories-template">
      <li class="flex items-center" id="blogsAll">
        <img src="images/marker1.png" alt="" class="me-2" />
        <a href="blog.html" class="active">Show All</a>
      </li>

      {{#each data}}
        <li class="flex items-center" id="category{{id}}">
          <img src="images/marker1.png" alt="" class="me-2" />
          <a
            href="blog.html?category={{id}}"
            class="hover:text-cyan-500!"
          >{{name}}</a>
        </li>
      {{/each}}
    </script>

    <!-- Blogs template -->
    <script type="text/x-handlebars-template" id="blogs-template">
      {{#each data.data}}
        <div class="py-4 clear-both">
          <h2 class="text-3xl font-heading hover:highlight">
            <a href="blog-details.html?id={{id}}">{{title}}</a>
          </h2>
          <p class="pb-4">
            by
            {{#if author}}{{author.name}}{{else}}Anonymous{{/if}}
            in
            <a
              href="blogs.html?category=34"
              class="read-more"
            >{{category.name}}</a>
            on
            {{created_at}}
            <a
              href="blog-details.html?id=44#comments"
              class="read-more"
            >Comments {{comments.length}}</a>
          </p>
          <img
            src={{thumbpath}}
            alt={{title}}
            class="float-start mb-8 me-8 rounded-xl"
          />
          <p class="text-justify">
            {{summary}}
          </p>
          <a href="blog-details.html?id={{id}}" class="read-more">Read more...</a>
        </div>
      {{/each}}

      {{#with data.pagination}}
      <nav class="clear-both mt-8 flex justify-center" aria-label="Page navigation example">
              {{#pagination currentPage pageCount size}}
              <ul class="flex -space-x-px text-sm">
                {{#unless startFromFirstPage}}
                <li>
                  <a
                    href="#"
                    class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-s-base text-sm w-9 h-9 focus:outline-none"
                  >
                    <span class="sr-only">Previous</span>
                    <svg
                      class="w-4 h-4 rtl:rotate-180"
                      aria-hidden="true"
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="m15 19-7-7 7-7"
                      />
                    </svg>
                  </a>
                </li>
                {{/unless}}

                {{#each pages}}
                {{#if isCurrent}}
                <li>
                  <a
                    href="blog.html?page={{page}}&category={{../../category}}"
                    class="active flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium text-sm w-9 h-9 focus:outline-none"
                    >{{page}}</a
                  >
                </li>
                {{/if}}

                {{#unless isCurrent}}
                <li>
                  <a
                    href="blog.html?page={{page}}&category={{../../category}}"
                    class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium text-sm w-9 h-9 focus:outline-none"
                    >{{page}}</a
                  >
                </li>
                {{/unless}}
                {{/each}}

                {{#unless endAtLastPage}}
                <li>
                  <a
                    href="#"
                    class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-e-base text-sm w-9 h-9 focus:outline-none"
                  >
                    <span class="sr-only">Next</span>
                    <svg
                      class="w-4 h-4 rtl:rotate-180"
                      aria-hidden="true"
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      fill="none"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="m9 5 7 7-7 7"
                      />
                    </svg>
                  </a>
                </li>
                {{/unless}}
              </ul>
              {{/pagination}}
            </nav>
            {{/with}}
    </script>

    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/mssv.js"></script>
    <script src="js/api/database.js"></script>

    <script>
      (async function () {
        const categories = await fetchCategoriesByType("blogs");
        
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const category = urlParams.get("category");
        const page = urlParams.get("page") ?? 1;

        let blogs = await fetchBlogsByCategoryId(category, page);

        renderView("blogs-categories-template", "blogs-categories", categories);
        renderView("blogs-template", "blogs", blogs);

        highlightChosenCate(category ?? null);
      })();

      function highlightChosenCate(id) {
        const categoriesRoot = document.querySelector("#blogs-categories");
        if (!categoriesRoot) return;

        categoriesRoot.querySelector(".active")?.classList.remove("active");
        categoriesRoot
          .querySelector(id ? `#category${id} a` : "#blogsAll a")
          ?.classList.add("active");
      }
    </script>
  </body>
</html>
